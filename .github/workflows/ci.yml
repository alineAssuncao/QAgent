name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install FFmpeg dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pytest-cov pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Lint with ruff
      run: |
        # Scan only our source code, avoiding 'projects/' folder entirely
        ruff check main.py core/ handlers/ memory/ agents/
        
    - name: Test with pytest
      run: |
        # Usamos timeout para garantir que o job não fique travado infinitamente se um processo pendurar
        timeout 5m pytest --cov-report=xml
      env:
        ENVIRONMENT: test
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_ALLOWED_USER_IDS: ${{ secrets.TELEGRAM_ALLOWED_USER_IDS }}
