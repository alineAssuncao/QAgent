[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .

# Otimização: Medir cobertura apenas das pastas do nosso código real
addopts = 
    --cov=core 
    --cov=handlers 
    --cov=memory 
    --cov=agents
    --cov=main
    --cov-report=xml 
    --cov-report=term-missing
    --ignore=projects
    --ignore=tmp
    --ignore=scratch