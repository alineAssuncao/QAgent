[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Otimização: Medir cobertura apenas das pastas do nosso código real
# Isso evita que o pytest tente ler milhares de arquivos na pasta 'projects/'
addopts = 
    --cov=core 
    --cov=handlers 
    --cov=memory 
    --cov=utils
    --cov-report=xml 
    --cov-report=term-missing
    --ignore=projects
    --ignore=tmp
    --ignore=scratch